name: quickped
description: QuickPed - Multi-Campus Bike Sharing Platform
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0

  # Navigation
  go_router: ^10.0.0

  # HTTP & API
  dio: ^5.3.0
  retrofit: ^4.0.0
  json_serializable: ^6.7.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  firebase_database: ^10.2.0
  firebase_messaging: ^14.6.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  geocoding: ^2.1.1

  # QR Scanning
  mobile_scanner: ^3.5.0

  # UI
  flutter_screenutil: ^5.9.0
  animations: ^2.0.0
  flutter_svg: ^2.0.0

  # Date & Time
  intl: ^0.18.1
  timezone: ^0.9.2

  # Utils
  http: ^1.1.0
  logger: ^2.0.0
  connectivity_plus: ^5.0.0
  package_info_plus: ^4.1.0

  # Notifications
  awesome_notifications: ^0.7.4+1

  # Payment Gateway (Placeholder - add specific one)
  # TODO: PAYMENT GATEWAY - Add Razorpay or Stripe SDK
  # For Razorpay: razorpay_flutter: ^1.3.0
  # For Stripe: flutter_stripe: ^9.0.0

  # State persistence
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  retrofit_generator: ^7.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
